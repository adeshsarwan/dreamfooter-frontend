<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Team | DreamFooter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="fixed inset-0 pointer-events-none bg-[radial-gradient(circle_at_top,rgba(168,85,247,0.20),transparent_32%),radial-gradient(circle_at_80%_20%,rgba(34,197,94,0.11),transparent_28%)]"></div>
  <main class="page-shell relative">
    <header class="df-header">
      <a class="brand" href="/">
        <div class="brand-icon">🏆</div>
        <div>
          <div class="text-2xl uppercase">Dream<span>Footer</span></div>
          <div class="text-[10px] uppercase tracking-[.28em] text-slate-400">Arena Market</div>
        </div>
      </a>
      <nav class="df-nav">
        <a href="/">Home</a>
        <a href="/schedule.html">Schedule</a>
        <a href="/groups.html">Groups</a>
        <a href="/teams.html" class="active">Teams</a>
        <a href="/players.html">Players</a>
        <a href="/worldcups.html">World Cups</a>
        <a href="/live.html">Live</a>
        <a href="/predictions.html">Predictions</a>
        <a href="/fantasy.html">Fantasy Squad</a>
      </nav>
    </header>

    <section id="teamHero" class="team-page-hero hero-card"></section>

    <section class="team-season-layout current-season">
      <article class="panel team-lineup-panel">
        <div class="team-panel-head">
          <h2>Starting XI</h2>
          <div id="formationPill" class="pill">4-3-3</div>
        </div>
        <div id="lineupPitch" class="lineup-pitch"></div>
      </article>

      <article class="panel team-subs-panel">
        <h2>Substitutes</h2>
        <div id="subsList" class="squad-mini-list"></div>
      </article>

      <article class="panel team-standout-panel">
        <h2>Standout Players</h2>
        <div id="standoutPlayers" class="standout-list"></div>
      </article>
    </section>

    <section class="panel mt-4">
      <h2 class="text-xl font-black">Matches</h2>
      <div id="fixtures" class="team-match-list mt-3"></div>
    </section>

    <section class="panel mt-4">
      <h2 class="text-xl font-black">World Cup History</h2>
      <div id="historyCards" class="history-card-row mt-3"></div>
    </section>

    <div id="historyDetail" class="mt-4"></div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/team.js"></script>
</body>
</html>
